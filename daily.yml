name: Daily Lead Gen

on:
  schedule:
    # 13:30 UTC daily = 6:30am Pacific. Adjust as desired.
    - cron: '30 13 * * *'
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Restore budget state
        uses: actions/cache@v4
        with:
          path: state/
          # Cache key includes today's date so state survives within a day
          # but a fresh key tomorrow gets a clean budget if cache misses.
          # The script also self-resets the budget at date rollover anyway.
          key: leadgen-state-${{ github.run_id }}
          restore-keys: |
            leadgen-state-

      - name: Write service account file
        run: |
          mkdir -p .
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Run lead gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAILY_BUDGET_USD: '50'
          GOOGLE_SERVICE_ACCOUNT_FILE: ./service_account.json
        run: python lead_gen.py

      - name: Save budget state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: leadgen-state-${{ github.run_id }}
